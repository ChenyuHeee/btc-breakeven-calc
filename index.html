<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC 回本计算器</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --card: #ffffff;
        --text: #1a1a22;
        --muted: #777;
        --border: #e0d0b8;
        --accent: #c26a27;
        --green: #1a7a4a;
        --green-bg: #edfaf3;
        --red: #b83333;
        --red-bg: #fdf0f0;
        --yellow: #7a6200;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 16px 48px;
        gap: 18px;
      }

      /* ── live price bar ── */
      .live-bar {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      }

      .live-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .live-price {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }

      .live-price.flash { animation: flash 400ms ease; }

      @keyframes flash {
        0%   { opacity: 1; }
        40%  { opacity: 0.35; }
        100% { opacity: 1; }
      }

      .ws-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #ccc;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .ws-dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(26,122,74,0.15); }
      .ws-dot.error     { background: var(--red); }

      .ws-info {
        display: flex; align-items: center; gap: 8px;
        font-size: 0.83rem; color: var(--muted);
      }

      .use-price-btn {
        background: #fff7ef;
        border: 1px solid #e0bb90;
        color: var(--accent);
        border-radius: 999px;
        padding: 8px 14px;
        font: inherit; font-size: 0.88rem;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
        transition: background 0.15s, transform 0.12s;
      }
      .use-price-btn:hover { background: #fce9d4; transform: translateY(-1px); }

      /* ── main card ── */
      .card {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px 26px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        display: flex; flex-direction: column; gap: 22px;
      }

      .card-title    { font-size: 1.25rem; font-weight: 700; }
      .card-subtitle { color: var(--muted); font-size: 0.93rem; margin-top: 4px; }

      /* steps */
      .steps { display: flex; flex-direction: column; gap: 16px; }
      .step  { display: flex; align-items: flex-start; gap: 14px; }

      .step-num {
        width: 28px; height: 28px; border-radius: 50%;
        background: #f3ebe0; color: var(--accent);
        font-weight: 700; font-size: 0.88rem;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; margin-top: 10px;
      }

      .step-body { flex: 1; }
      .step-body label {
        display: block; font-size: 0.9rem;
        color: var(--muted); margin-bottom: 7px;
      }

      .input-wrap { position: relative; }

      .input-wrap input {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 13px 58px 13px 16px;
        font: inherit; font-size: 1.1rem;
        color: var(--text); background: #fdfaf6;
        transition: border-color 0.15s, box-shadow 0.15s;
        -moz-appearance: textfield;
      }
      .input-wrap input::-webkit-outer-spin-button,
      .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
      .input-wrap input:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(194,106,39,0.12); background: #fff;
      }

      .input-unit {
        position: absolute; right: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 0.85rem; color: var(--muted); pointer-events: none;
      }

      /* fee toggle */
      .fee-toggle {
        font-size: 0.83rem; color: var(--accent); cursor: pointer;
        margin-top: 8px; display: inline-block; text-decoration: underline dotted;
      }
      .fee-section { margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
      .fee-section.hidden { display: none; }
      .fee-row { display: flex; gap: 12px; }
      .fee-row .input-wrap { flex: 1; }
      .fee-row .input-wrap input { font-size: 0.98rem; padding: 11px 42px 11px 14px; }
      .fee-note { font-size: 0.82rem; color: var(--muted); }

      /* result */
      .result-box {
        border-radius: 20px; padding: 22px 22px 18px;
        display: flex; flex-direction: column; gap: 10px;
        background: #f9f5ef; border: 1.5px solid var(--border);
        transition: background 0.3s, border-color 0.3s;
      }
      .result-box.green { background: var(--green-bg); border-color: #a8ddc0; }
      .result-box.red   { background: var(--red-bg);   border-color: #f0b8b8; }

      .result-label  { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
      .result-price  {
        font-size: 2.4rem; font-weight: 800; color: var(--text);
        letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1.1;
      }
      .result-price sup { font-size: 1rem; font-weight: 600; vertical-align: super; color: var(--muted); }

      .result-verdict {
        font-size: 1rem; font-weight: 600;
        padding: 10px 14px; border-radius: 12px; line-height: 1.5;
      }
      .result-verdict.green   { color: var(--green); background: rgba(26,122,74,0.08); }
      .result-verdict.red     { color: var(--red);   background: rgba(184,51,51,0.08); }
      .result-verdict.neutral { color: var(--yellow); background: rgba(122,98,0,0.07); }

      .result-detail { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
      .formula-note  { font-size: 0.8rem; color: #bbb; text-align: center; }

      /* ── signal card ── */
      .signal-card {
        width: min(640px, 100%);
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 24px;
        padding: 22px 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        display: flex; flex-direction: column; gap: 16px;
      }
      .signal-card.sig-buy  { border-color: #a8ddc0; background: var(--green-bg); }
      .signal-card.sig-wait { border-color: #f5d97a; background: #fffaeb; }
      .signal-card.sig-no   { border-color: #f0b8b8; background: var(--red-bg); }

      .signal-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .signal-emoji  { font-size: 2.6rem; line-height: 1; }
      .signal-main   { flex: 1; }
      .signal-title  { font-size: 1.4rem; font-weight: 800; line-height: 1.1; }
      .signal-sub    { font-size: 0.9rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }
      .signal-refresh {
        font-size: 0.78rem; color: var(--muted); cursor: pointer;
        border: 1px solid var(--border); border-radius: 999px;
        padding: 5px 10px; background: #fff; white-space: nowrap; flex-shrink: 0;
        transition: background 0.15s;
      }
      .signal-refresh:hover { background: #f3ebe0; }

      .indicators { display: flex; gap: 10px; }
      .ind-box {
        flex: 1; background: rgba(255,255,255,0.7); border: 1px solid var(--border);
        border-radius: 14px; padding: 12px 14px;
        display: flex; flex-direction: column; gap: 6px;
      }
      .ind-label { font-size: 0.78rem; color: var(--muted); }
      .ind-value { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }
      .ind-value.good { color: var(--green); }
      .ind-value.bad  { color: var(--red); }
      .ind-value.mid  { color: var(--yellow); }
      .ind-bar-wrap { height: 5px; background: #e0d0b8; border-radius: 999px; overflow: hidden; }
      .ind-bar      { height: 100%; border-radius: 999px; transition: width 0.5s; }

      .signal-note { font-size: 0.8rem; color: #aaa; line-height: 1.6; }

      @media (max-width: 480px) {
        .live-price { font-size: 1.6rem; }
        .card { padding: 20px 16px; }
        .result-price { font-size: 1.9rem; }
        .fee-row { flex-direction: column; }
        .indicators { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>

    <div class="live-bar">
      <div>
        <div class="live-label">Binance BTC/USDT 实时价格</div>
        <div class="live-price" id="livePrice">连接中...</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="ws-info">
          <div class="ws-dot" id="wsDot"></div>
          <span id="wsLabel">--</span>
        </div>
        <button class="use-price-btn" id="usePriceBtn">用当前价买入</button>
      </div>
    </div>

    <div class="signal-card" id="signalCard">
      <div class="signal-header">
        <div class="signal-emoji" id="signalEmoji">⏳</div>
        <div class="signal-main">
          <div class="signal-title" id="signalTitle">分析中...</div>
          <div class="signal-sub"  id="signalSub">正在获取 Binance 数据</div>
        </div>
        <button class="signal-refresh" id="signalRefresh">刷新</button>
      </div>
      <div class="indicators">
        <div class="ind-box">
          <div class="ind-label">RSI(14) 超买超卖指数</div>
          <div class="ind-value" id="indRsiVal">--</div>
          <div class="ind-bar-wrap"><div class="ind-bar" id="indRsiBar" style="width:0%;background:#ccc"></div></div>
        </div>
        <div class="ind-box">
          <div class="ind-label">价格 vs 均线(MA20)</div>
          <div class="ind-value" id="indMaVal">--</div>
          <div class="ind-bar-wrap"><div class="ind-bar" id="indMaBar" style="width:50%;background:#ccc"></div></div>
        </div>
        <div class="ind-box">
          <div class="ind-label">24h 涨跌幅</div>
          <div class="ind-value" id="indChgVal">--</div>
          <div class="ind-bar-wrap"><div class="ind-bar" id="indChgBar" style="width:50%;background:#ccc"></div></div>
        </div>
      </div>
      <div class="signal-note" id="signalNote"></div>
    </div>

    <div class="card">
      <div>
        <div class="card-title">我的买入计划</div>
        <div class="card-subtitle">填好下面三步，马上告诉你卖到多少才不亏</div>
      </div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-body">
            <label for="buyPrice">我打算在这个价格买入（USDT）</label>
            <div class="input-wrap">
              <input id="buyPrice" type="number" inputmode="decimal" min="0" step="any" placeholder="例如 77000" />
              <span class="input-unit">USDT</span>
            </div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">2</div>
          <div class="step-body">
            <label for="amount">我准备花这么多钱买（USDT）</label>
            <div class="input-wrap">
              <input id="amount" type="number" inputmode="decimal" min="0" step="any" placeholder="例如 1000" />
              <span class="input-unit">USDT</span>
            </div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">3</div>
          <div class="step-body">
            <label>手续费（不确定可以用默认值）</label>
            <span class="fee-toggle" id="feeToggle">▸ 展开手续费设置（默认：买入 0.1% · 卖出 0.1%）</span>
            <div class="fee-section hidden" id="feeSection">
              <div class="fee-row">
                <div class="input-wrap">
                  <input id="buyFeeRate" type="number" inputmode="decimal" min="0" step="any" placeholder="买入手续费率" />
                  <span class="input-unit">%</span>
                </div>
                <div class="input-wrap">
                  <input id="sellFeeRate" type="number" inputmode="decimal" min="0" step="any" placeholder="卖出手续费率" />
                  <span class="input-unit">%</span>
                </div>
              </div>
              <div class="fee-note">Binance 现货普通用户一般是 0.1%，用 BNB 抵扣约 0.075%</div>
            </div>
          </div>
        </div>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-label">卖出不亏的最低价格</div>
        <div class="result-price" id="resultPrice"><sup>USDT </sup>--</div>
        <div class="result-verdict" id="resultVerdict" style="display:none;"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <div class="formula-note" id="formulaNote"></div>
    </div>

    <script>
      const BINANCE_WS = "wss://stream.binance.com:9443/ws/btcusdt@trade";

      const livePriceEl     = document.getElementById("livePrice");
      const wsDotEl         = document.getElementById("wsDot");
      const wsLabelEl       = document.getElementById("wsLabel");
      const usePriceBtn     = document.getElementById("usePriceBtn");
      const feeToggle       = document.getElementById("feeToggle");
      const feeSection      = document.getElementById("feeSection");
      const buyPriceInput   = document.getElementById("buyPrice");
      const amountInput     = document.getElementById("amount");
      const buyFeeRateInput = document.getElementById("buyFeeRate");
      const sellFeeRateInput= document.getElementById("sellFeeRate");
      const resultBox       = document.getElementById("resultBox");
      const resultPriceEl   = document.getElementById("resultPrice");
      const resultVerdictEl = document.getElementById("resultVerdict");
      const resultDetailEl  = document.getElementById("resultDetail");
      const formulaNoteEl   = document.getElementById("formulaNote");

      const signalCardEl  = document.getElementById("signalCard");
      const signalEmoji   = document.getElementById("signalEmoji");
      const signalTitle   = document.getElementById("signalTitle");
      const signalSub     = document.getElementById("signalSub");
      const signalNote    = document.getElementById("signalNote");
      const signalRefresh = document.getElementById("signalRefresh");
      const indRsiVal     = document.getElementById("indRsiVal");
      const indRsiBar     = document.getElementById("indRsiBar");
      const indMaVal      = document.getElementById("indMaVal");
      const indMaBar      = document.getElementById("indMaBar");
      const indChgVal     = document.getElementById("indChgVal");
      const indChgBar     = document.getElementById("indChgBar");

      let currentMarketPrice = null;
      let socket = null;
      let reconnectTimer = null;
      let feeOpen = false;

      // ── RSI 计算 ──
      function calcRSI(closes, period = 14) {
        if (closes.length < period + 1) return null;
        let gains = 0, losses = 0;
        for (let i = closes.length - period; i < closes.length; i++) {
          const d = closes[i] - closes[i - 1];
          if (d > 0) gains += d; else losses -= d;
        }
        const avgGain = gains / period;
        const avgLoss = losses / period;
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return 100 - 100 / (1 + rs);
      }

      // ── MA 计算 ──
      function calcMA(closes, period) {
        if (closes.length < period) return null;
        const slice = closes.slice(-period);
        return slice.reduce((a, b) => a + b, 0) / period;
      }

      // ── 信号分析 ──
      async function fetchSignal() {
        signalTitle.textContent = "分析中...";
        signalSub.textContent   = "正在获取数据";
        signalCardEl.className  = "signal-card";
        try {
          // 拿 1h K线最近 60 根 + 24h ticker
          const [klRes, tkRes] = await Promise.all([
            fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=60"),
            fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT")
          ]);
          const klines = await klRes.json();
          const ticker = await tkRes.json();

          // kline: [openTime, open, high, low, close, ...]
          const closes = klines.map(k => parseFloat(k[4]));
          const rsi    = calcRSI(closes, 14);
          const ma20   = calcMA(closes, 20);
          const price  = closes[closes.length - 1];
          const chgPct = parseFloat(ticker.priceChangePercent);

          // ── 展示各指标 ──
          // RSI bar: 0~100
          indRsiVal.textContent = rsi != null ? rsi.toFixed(1) : "--";
          indRsiBar.style.width = (rsi ?? 50) + "%";
          if (rsi < 35)       { indRsiVal.className="ind-value good"; indRsiBar.style.background="var(--green)"; }
          else if (rsi < 55)  { indRsiVal.className="ind-value mid";  indRsiBar.style.background="#f0c040"; }
          else                { indRsiVal.className="ind-value bad";  indRsiBar.style.background="var(--red)"; }

          // MA 偏离：price vs MA20
          const maDiff = ma20 ? ((price - ma20) / ma20 * 100) : 0;
          indMaVal.textContent = ma20
            ? (maDiff >= 0 ? "+" : "") + maDiff.toFixed(2) + "% vs MA20"
            : "--";
          // bar: 50% = at MA, 0=far below, 100=far above
          const maBarPct = Math.min(100, Math.max(0, 50 + maDiff * 5));
          indMaBar.style.width = maBarPct + "%";
          if (maDiff < -1)        { indMaVal.className="ind-value good"; indMaBar.style.background="var(--green)"; }
          else if (maDiff < 1.5)  { indMaVal.className="ind-value mid";  indMaBar.style.background="#f0c040"; }
          else                    { indMaVal.className="ind-value bad";  indMaBar.style.background="var(--red)"; }

          // 24h 涨跌
          indChgVal.textContent = (chgPct >= 0 ? "+" : "") + chgPct.toFixed(2) + "%";
          const chgBarPct = Math.min(100, Math.max(0, 50 + chgPct * 3));
          indChgBar.style.width = chgBarPct + "%";
          if (chgPct < -3)      { indChgVal.className="ind-value good"; indChgBar.style.background="var(--green)"; }
          else if (chgPct < 3)  { indChgVal.className="ind-value mid";  indChgBar.style.background="#f0c040"; }
          else                  { indChgVal.className="ind-value bad";  indChgBar.style.background="var(--red)"; }

          // ── 综合信号决策 ──
          let score = 0;
          // RSI 评分
          if (rsi < 30) score += 3;
          else if (rsi < 40) score += 2;
          else if (rsi < 50) score += 1;
          else if (rsi > 70) score -= 3;
          else if (rsi > 60) score -= 1;
          // MA 评分
          if (maDiff < -2) score += 2;
          else if (maDiff < 0) score += 1;
          else if (maDiff > 3) score -= 2;
          else if (maDiff > 1.5) score -= 1;
          // 24h 涨跌评分
          if (chgPct < -5) score += 2;
          else if (chgPct < -2) score += 1;
          else if (chgPct > 5) score -= 2;
          else if (chgPct > 3) score -= 1;

          let rsiText, maText, chgText;
          rsiText = rsi < 35 ? "处于超卖区（历史上这个位置反弹概率较高）"
                  : rsi < 50 ? "未过热，情绪偏冷"
                  : rsi < 65 ? "正常范围，没有明显信号"
                  : "处于超买区（短期涨太多，追高风险大）";
          maText  = maDiff < -1 ? "价格低于20小时均线，属于阶段低位"
                  : maDiff < 1.5 ? "价格在均线附近，位置中性"
                  : "价格高于均线较多，追高需谨慎";
          chgText = chgPct < -3 ? "今日大跌，可能是低吸机会"
                  : chgPct < 0 ? "今日小幅下跌"
                  : chgPct < 3 ? "今日小幅上涨"
                  : "今日涨幅较大，追高风险增加";

          if (score >= 4) {
            signalCardEl.className = "signal-card sig-buy";
            signalEmoji.textContent = "🟢";
            signalTitle.textContent = "现在是相对好的买入时机";
            signalSub.textContent   = "多个指标同时显示价格偏低，可以考虑买入";
          } else if (score >= 2) {
            signalCardEl.className = "signal-card sig-buy";
            signalEmoji.textContent = "🟡";
            signalTitle.textContent = "可以小仓位试探";
            signalSub.textContent   = "指标偏向有利，但信号不算强，建议先买一部分";
          } else if (score >= 0) {
            signalCardEl.className = "signal-card sig-wait";
            signalEmoji.textContent = "🟡";
            signalTitle.textContent = "观望，信号不明";
            signalSub.textContent   = "当前没有明显的低位信号，等等看";
          } else if (score >= -2) {
            signalCardEl.className = "signal-card sig-no";
            signalEmoji.textContent = "🔴";
            signalTitle.textContent = "暂时不建议买入";
            signalSub.textContent   = "价格偏高或刚涨过一波，等回调再进";
          } else {
            signalCardEl.className = "signal-card sig-no";
            signalEmoji.textContent = "🔴";
            signalTitle.textContent = "不建议现在买";
            signalSub.textContent   = "多个指标显示价格过热，追高亏钱概率大";
          }

          signalNote.textContent =
            "RSI：" + rsiText + "。均线：" + maText + "。涨跌：" + chgText +
            "。（数据来自 Binance 1小时K线，仅供参考，不构成投资建议）";
        } catch (e) {
          signalTitle.textContent = "获取数据失败";
          signalSub.textContent   = "请检查网络连接后点击刷新";
        }
      }

      signalRefresh.addEventListener("click", fetchSignal);
      fetchSignal();
      setInterval(fetchSignal, 5 * 60 * 1000); // 每5分钟自动刷新

      feeToggle.addEventListener("click", () => {
        feeOpen = !feeOpen;
        feeSection.classList.toggle("hidden", !feeOpen);
        feeToggle.textContent = feeOpen
          ? "▾ 收起手续费设置"
          : "▸ 展开手续费设置（默认：买入 0.1% · 卖出 0.1%）";
      });

      function fmt(n, d = 2) {
        if (!Number.isFinite(n)) return "--";
        return n.toLocaleString("zh-CN", { minimumFractionDigits: d, maximumFractionDigits: d });
      }

      function parseNonNeg(v) {
        const n = parseFloat(v);
        return Number.isFinite(n) && n >= 0 ? n : NaN;
      }

      function calculate() {
        const buyPrice    = parseNonNeg(buyPriceInput.value);
        const amount      = parseNonNeg(amountInput.value);
        const buyFeeRate  = parseNonNeg(buyFeeRateInput.value  || "0.1") / 100;
        const sellFeeRate = parseNonNeg(sellFeeRateInput.value || "0.1") / 100;

        resultBox.className = "result-box";
        resultPriceEl.innerHTML = "<sup>USDT </sup>--";
        resultVerdictEl.style.display = "none";
        resultVerdictEl.className = "result-verdict";
        resultDetailEl.textContent = "";
        formulaNoteEl.textContent = "";

        if (!Number.isFinite(buyPrice) || !Number.isFinite(amount)) return;
        if (buyPrice <= 0 || amount <= 0) return;

        // 买到的 BTC（已扣买入手续费）
        const btcBought = (amount / buyPrice) * (1 - buyFeeRate);
        if (btcBought <= 0) return;

        // 回本卖价：netUsdt = btcBought * P * (1 - sellFeeRate) = amount
        const breakEven = amount / (btcBought * (1 - sellFeeRate));

        resultPriceEl.innerHTML = "<sup>USDT </sup>" + fmt(breakEven, 2);
        formulaNoteEl.textContent =
          "买到 " + fmt(btcBought, 6) + " BTC，" +
          "买入手续费 " + (buyFeeRate * 100).toFixed(2) + "% · " +
          "卖出手续费 " + (sellFeeRate * 100).toFixed(2) + "%";

        if (Number.isFinite(currentMarketPrice) && currentMarketPrice > 0) {
          const gap          = currentMarketPrice - breakEven;
          const netIfSellNow = btcBought * currentMarketPrice * (1 - sellFeeRate);
          const pnl          = netIfSellNow - amount;

          if (gap > 0.5) {
            resultBox.className = "result-box green";
            resultVerdictEl.className = "result-verdict green";
            resultVerdictEl.textContent =
              "✅ 好消息：当前市价（" + fmt(currentMarketPrice) + " USDT）已高于回本价，" +
              "现在卖可以赚约 " + fmt(pnl) + " USDT";
          } else if (Math.abs(gap) <= 0.5) {
            resultVerdictEl.className = "result-verdict neutral";
            resultVerdictEl.textContent =
              "⚖️ 当前市价（" + fmt(currentMarketPrice) + " USDT）与回本价非常接近，卖出基本不赚不亏";
          } else {
            resultBox.className = "result-box red";
            resultVerdictEl.className = "result-verdict red";
            resultVerdictEl.textContent =
              "⚠️ 当前市价（" + fmt(currentMarketPrice) + " USDT）低于回本价，" +
              "现在卖会亏约 " + fmt(Math.abs(pnl)) + " USDT，" +
              "还需涨 " + fmt(Math.abs(gap)) + " USDT 才能回本";
          }
          resultVerdictEl.style.display = "block";
          resultDetailEl.textContent =
            "你花 " + fmt(amount) + " USDT 买到 " + fmt(btcBought, 6) + " BTC，" +
            "只要卖价超过 " + fmt(breakEven) + " USDT 就不亏。";
        } else {
          resultDetailEl.textContent =
            "你花 " + fmt(amount) + " USDT 可以买到约 " + fmt(btcBought, 6) + " BTC，" +
            "卖价只要高于 " + fmt(breakEven) + " USDT 就不亏。";
        }
      }

      function setWsState(state) {
        wsDotEl.className = "ws-dot " + state;
        wsLabelEl.textContent = state === "connected" ? "实时连接中" : state === "error" ? "连接断开" : "连接中...";
      }

      function connect() {
        if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        setWsState("");
        socket = new WebSocket(BINANCE_WS);
        socket.addEventListener("open",  () => setWsState("connected"));
        socket.addEventListener("error", () => setWsState("error"));
        socket.addEventListener("close", () => {
          setWsState("error");
          socket = null;
          reconnectTimer = setTimeout(connect, 2000);
        });
        socket.addEventListener("message", (ev) => {
          try {
            const price = Number(JSON.parse(ev.data).p);
            if (!Number.isFinite(price) || price <= 0) return;
            livePriceEl.classList.remove("flash");
            void livePriceEl.offsetWidth;
            livePriceEl.classList.add("flash");
            livePriceEl.textContent = fmt(price, 2);
            currentMarketPrice = price;
            calculate();
          } catch (_) {}
        });
      }

      usePriceBtn.addEventListener("click", () => {
        if (!Number.isFinite(currentMarketPrice)) return;
        buyPriceInput.value = currentMarketPrice.toFixed(2);
        calculate();
        buyPriceInput.focus();
      });

      [buyPriceInput, amountInput, buyFeeRateInput, sellFeeRateInput].forEach(el =>
        el.addEventListener("input", calculate)
      );

      connect();
    </script>
  </body>
</html>
