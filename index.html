<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC 回本计算器</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --card: #ffffff;
        --text: #1a1a22;
        --muted: #777;
        --border: #e0d0b8;
        --accent: #c26a27;
        --green: #1a7a4a;
        --green-bg: #edfaf3;
        --red: #b83333;
        --red-bg: #fdf0f0;
        --yellow: #7a6200;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 16px 48px;
        gap: 18px;
      }

      /* ── live price bar ── */
      .live-bar {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      }

      .live-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .live-price {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }

      .live-price.flash { animation: flash 400ms ease; }

      @keyframes flash {
        0%   { opacity: 1; }
        40%  { opacity: 0.35; }
        100% { opacity: 1; }
      }

      .ws-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #ccc;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .ws-dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(26,122,74,0.15); }
      .ws-dot.error     { background: var(--red); }

      .ws-info {
        display: flex; align-items: center; gap: 8px;
        font-size: 0.83rem; color: var(--muted);
      }

      .use-price-btn {
        background: #fff7ef;
        border: 1px solid #e0bb90;
        color: var(--accent);
        border-radius: 999px;
        padding: 8px 14px;
        font: inherit; font-size: 0.88rem;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
        transition: background 0.15s, transform 0.12s;
      }
      .use-price-btn:hover { background: #fce9d4; transform: translateY(-1px); }

      /* ── main card ── */
      .card {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px 26px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        display: flex; flex-direction: column; gap: 22px;
      }

      .card-title    { font-size: 1.25rem; font-weight: 700; }
      .card-subtitle { color: var(--muted); font-size: 0.93rem; margin-top: 4px; }

      /* steps */
      .steps { display: flex; flex-direction: column; gap: 16px; }
      .step  { display: flex; align-items: flex-start; gap: 14px; }

      .step-num {
        width: 28px; height: 28px; border-radius: 50%;
        background: #f3ebe0; color: var(--accent);
        font-weight: 700; font-size: 0.88rem;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; margin-top: 10px;
      }

      .step-body { flex: 1; }
      .step-body label {
        display: block; font-size: 0.9rem;
        color: var(--muted); margin-bottom: 7px;
      }

      .input-wrap { position: relative; }

      .input-wrap input {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 13px 58px 13px 16px;
        font: inherit; font-size: 1.1rem;
        color: var(--text); background: #fdfaf6;
        transition: border-color 0.15s, box-shadow 0.15s;
        -moz-appearance: textfield;
      }
      .input-wrap input::-webkit-outer-spin-button,
      .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
      .input-wrap input:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(194,106,39,0.12); background: #fff;
      }

      .input-unit {
        position: absolute; right: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 0.85rem; color: var(--muted); pointer-events: none;
      }

      /* fee toggle */
      .fee-toggle {
        font-size: 0.83rem; color: var(--accent); cursor: pointer;
        margin-top: 8px; display: inline-block; text-decoration: underline dotted;
      }
      .fee-section { margin-top: 12px; display: flex; flex-direction: column; gap: 12px; }
      .fee-section.hidden { display: none; }
      .fee-row { display: flex; gap: 12px; }
      .fee-row .input-wrap { flex: 1; }
      .fee-row .input-wrap input { font-size: 0.98rem; padding: 11px 42px 11px 14px; }
      .fee-note { font-size: 0.82rem; color: var(--muted); }

      /* result */
      .result-box {
        border-radius: 20px; padding: 22px 22px 18px;
        display: flex; flex-direction: column; gap: 10px;
        background: #f9f5ef; border: 1.5px solid var(--border);
        transition: background 0.3s, border-color 0.3s;
      }
      .result-box.green { background: var(--green-bg); border-color: #a8ddc0; }
      .result-box.red   { background: var(--red-bg);   border-color: #f0b8b8; }

      .result-label  { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
      .result-price  {
        font-size: 2.4rem; font-weight: 800; color: var(--text);
        letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1.1;
      }
      .result-price sup { font-size: 1rem; font-weight: 600; vertical-align: super; color: var(--muted); }

      .result-verdict {
        font-size: 1rem; font-weight: 600;
        padding: 10px 14px; border-radius: 12px; line-height: 1.5;
      }
      .result-verdict.green   { color: var(--green); background: rgba(26,122,74,0.08); }
      .result-verdict.red     { color: var(--red);   background: rgba(184,51,51,0.08); }
      .result-verdict.neutral { color: var(--yellow); background: rgba(122,98,0,0.07); }

      .result-detail { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
      .formula-note  { font-size: 0.8rem; color: #bbb; text-align: center; }

      /* ── market reference card ── */
      .ref-card {
        width: min(640px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px 22px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        display: flex; flex-direction: column; gap: 16px;
      }
      .ref-title { font-size: 0.85rem; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
      .stats-row { display: flex; gap: 10px; }
      .stat-box {
        flex: 1; background: #fdfaf6; border: 1px solid var(--border);
        border-radius: 14px; padding: 12px 14px;
        display: flex; flex-direction: column; gap: 4px;
      }
      .stat-label { font-size: 0.78rem; color: var(--muted); }
      .stat-value { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
      .stat-value.up   { color: var(--green); }
      .stat-value.down { color: var(--red); }

      .alert-row { display: flex; align-items: center; gap: 10px; }
      .alert-row label { font-size: 0.88rem; color: var(--muted); white-space: nowrap; }
      .alert-row .input-wrap { flex: 1; }
      .alert-row .input-wrap input { font-size: 1rem; padding: 11px 58px 11px 14px; }
      .alert-badge {
        font-size: 0.88rem; font-weight: 600;
        padding: 8px 14px; border-radius: 12px;
        white-space: nowrap; flex-shrink: 0;
        background: #f3ebe0; color: var(--muted);
        transition: background 0.3s, color 0.3s;
      }
      .alert-badge.hit  { background: #d4f0e2; color: var(--green); }
      .alert-badge.wait { background: #fdf0f0; color: var(--red); }

      @media (max-width: 480px) {
        .live-price { font-size: 1.6rem; }
        .card { padding: 20px 16px; }
        .result-price { font-size: 1.9rem; }
        .fee-row { flex-direction: column; }
        .stats-row { flex-wrap: wrap; }
        .alert-row { flex-wrap: wrap; }
        .alert-badge { width: 100%; text-align: center; }
      }
    </style>
  </head>
  <body>

    <div class="live-bar">
      <div>
        <div class="live-label">Binance BTC/USDT 实时价格</div>
        <div class="live-price" id="livePrice">连接中...</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="ws-info">
          <div class="ws-dot" id="wsDot"></div>
          <span id="wsLabel">--</span>
        </div>
        <button class="use-price-btn" id="usePriceBtn">用当前价买入</button>
      </div>
    </div>

    <div class="ref-card">
      <div class="ref-title">📊 买入参考（今日数据）</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">24小时涨跌</div>
          <div class="stat-value" id="stat24hChange">--</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">今日最高价</div>
          <div class="stat-value" id="stat24hHigh">--</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">今日最低价</div>
          <div class="stat-value" id="stat24hLow">--</div>
        </div>
      </div>
      <div class="alert-row">
        <label for="targetPrice">🎯 我想在这个价格买入：</label>
        <div class="input-wrap">
          <input id="targetPrice" type="number" inputmode="decimal" min="0" step="any" placeholder="例如 75000" />
          <span class="input-unit">USDT</span>
        </div>
        <div class="alert-badge" id="alertBadge">等待输入</div>
      </div>
    </div>

    <div class="card">
      <div>
        <div class="card-title">我的买入计划</div>
        <div class="card-subtitle">填好下面三步，马上告诉你卖到多少才不亏</div>
      </div>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-body">
            <label for="buyPrice">我打算在这个价格买入（USDT）</label>
            <div class="input-wrap">
              <input id="buyPrice" type="number" inputmode="decimal" min="0" step="any" placeholder="例如 77000" />
              <span class="input-unit">USDT</span>
            </div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">2</div>
          <div class="step-body">
            <label for="amount">我准备花这么多钱买（USDT）</label>
            <div class="input-wrap">
              <input id="amount" type="number" inputmode="decimal" min="0" step="any" placeholder="例如 1000" />
              <span class="input-unit">USDT</span>
            </div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">3</div>
          <div class="step-body">
            <label>手续费（不确定可以用默认值）</label>
            <span class="fee-toggle" id="feeToggle">▸ 展开手续费设置（默认：买入 0.1% · 卖出 0.1%）</span>
            <div class="fee-section hidden" id="feeSection">
              <div class="fee-row">
                <div class="input-wrap">
                  <input id="buyFeeRate" type="number" inputmode="decimal" min="0" step="any" placeholder="买入手续费率" />
                  <span class="input-unit">%</span>
                </div>
                <div class="input-wrap">
                  <input id="sellFeeRate" type="number" inputmode="decimal" min="0" step="any" placeholder="卖出手续费率" />
                  <span class="input-unit">%</span>
                </div>
              </div>
              <div class="fee-note">Binance 现货普通用户一般是 0.1%，用 BNB 抵扣约 0.075%</div>
            </div>
          </div>
        </div>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-label">卖出不亏的最低价格</div>
        <div class="result-price" id="resultPrice"><sup>USDT </sup>--</div>
        <div class="result-verdict" id="resultVerdict" style="display:none;"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <div class="formula-note" id="formulaNote"></div>
    </div>

    <script>
      const BINANCE_WS = "wss://stream.binance.com:9443/ws/btcusdt@trade";

      const livePriceEl     = document.getElementById("livePrice");
      const wsDotEl         = document.getElementById("wsDot");
      const wsLabelEl       = document.getElementById("wsLabel");
      const usePriceBtn     = document.getElementById("usePriceBtn");
      const feeToggle       = document.getElementById("feeToggle");
      const feeSection      = document.getElementById("feeSection");
      const buyPriceInput   = document.getElementById("buyPrice");
      const amountInput     = document.getElementById("amount");
      const buyFeeRateInput = document.getElementById("buyFeeRate");
      const sellFeeRateInput= document.getElementById("sellFeeRate");
      const resultBox       = document.getElementById("resultBox");
      const resultPriceEl   = document.getElementById("resultPrice");
      const resultVerdictEl = document.getElementById("resultVerdict");
      const resultDetailEl  = document.getElementById("resultDetail");
      const formulaNoteEl   = document.getElementById("formulaNote");

      const stat24hChangeEl = document.getElementById("stat24hChange");
      const stat24hHighEl   = document.getElementById("stat24hHigh");
      const stat24hLowEl    = document.getElementById("stat24hLow");
      const targetPriceInput= document.getElementById("targetPrice");
      const alertBadgeEl    = document.getElementById("alertBadge");

      let currentMarketPrice = null;
      let socket = null;
      let reconnectTimer = null;
      let feeOpen = false;
      let stat24hLow = null;

      // ── 24h stats from Binance REST ──
      async function fetch24h() {
        try {
          const res = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT");
          const d = await res.json();
          const pct = parseFloat(d.priceChangePercent);
          const high = parseFloat(d.highPrice);
          const low  = parseFloat(d.lowPrice);
          stat24hLow = low;

          stat24hChangeEl.textContent = (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
          stat24hChangeEl.className = "stat-value " + (pct >= 0 ? "up" : "down");
          stat24hHighEl.textContent = fmt(high, 2) + " U";
          stat24hLowEl.textContent  = fmt(low,  2) + " U";
          updateAlertBadge();
        } catch (_) {}
      }

      function updateAlertBadge() {
        const target = parseFloat(targetPriceInput.value);
        if (!Number.isFinite(target) || target <= 0) {
          alertBadgeEl.className = "alert-badge";
          alertBadgeEl.textContent = "等待输入";
          return;
        }
        if (Number.isFinite(currentMarketPrice) && currentMarketPrice <= target) {
          alertBadgeEl.className = "alert-badge hit";
          alertBadgeEl.textContent = "✅ 已到目标价，可以考虑买入";
        } else if (Number.isFinite(currentMarketPrice)) {
          const diff = currentMarketPrice - target;
          alertBadgeEl.className = "alert-badge wait";
          alertBadgeEl.textContent = "还差 " + fmt(diff, 0) + " USDT";
        }
      }

      targetPriceInput.addEventListener("input", updateAlertBadge);
      fetch24h();
      setInterval(fetch24h, 60000); // 每分钟刷新一次

      feeToggle.addEventListener("click", () => {
        feeOpen = !feeOpen;
        feeSection.classList.toggle("hidden", !feeOpen);
        feeToggle.textContent = feeOpen
          ? "▾ 收起手续费设置"
          : "▸ 展开手续费设置（默认：买入 0.1% · 卖出 0.1%）";
      });

      function fmt(n, d = 2) {
        if (!Number.isFinite(n)) return "--";
        return n.toLocaleString("zh-CN", { minimumFractionDigits: d, maximumFractionDigits: d });
      }

      function parseNonNeg(v) {
        const n = parseFloat(v);
        return Number.isFinite(n) && n >= 0 ? n : NaN;
      }

      function calculate() {
        const buyPrice    = parseNonNeg(buyPriceInput.value);
        const amount      = parseNonNeg(amountInput.value);
        const buyFeeRate  = parseNonNeg(buyFeeRateInput.value  || "0.1") / 100;
        const sellFeeRate = parseNonNeg(sellFeeRateInput.value || "0.1") / 100;

        resultBox.className = "result-box";
        resultPriceEl.innerHTML = "<sup>USDT </sup>--";
        resultVerdictEl.style.display = "none";
        resultVerdictEl.className = "result-verdict";
        resultDetailEl.textContent = "";
        formulaNoteEl.textContent = "";

        if (!Number.isFinite(buyPrice) || !Number.isFinite(amount)) return;
        if (buyPrice <= 0 || amount <= 0) return;

        // 买到的 BTC（已扣买入手续费）
        const btcBought = (amount / buyPrice) * (1 - buyFeeRate);
        if (btcBought <= 0) return;

        // 回本卖价：netUsdt = btcBought * P * (1 - sellFeeRate) = amount
        const breakEven = amount / (btcBought * (1 - sellFeeRate));

        resultPriceEl.innerHTML = "<sup>USDT </sup>" + fmt(breakEven, 2);
        formulaNoteEl.textContent =
          "买到 " + fmt(btcBought, 6) + " BTC，" +
          "买入手续费 " + (buyFeeRate * 100).toFixed(2) + "% · " +
          "卖出手续费 " + (sellFeeRate * 100).toFixed(2) + "%";

        if (Number.isFinite(currentMarketPrice) && currentMarketPrice > 0) {
          const gap          = currentMarketPrice - breakEven;
          const netIfSellNow = btcBought * currentMarketPrice * (1 - sellFeeRate);
          const pnl          = netIfSellNow - amount;

          if (gap > 0.5) {
            resultBox.className = "result-box green";
            resultVerdictEl.className = "result-verdict green";
            resultVerdictEl.textContent =
              "✅ 好消息：当前市价（" + fmt(currentMarketPrice) + " USDT）已高于回本价，" +
              "现在卖可以赚约 " + fmt(pnl) + " USDT";
          } else if (Math.abs(gap) <= 0.5) {
            resultVerdictEl.className = "result-verdict neutral";
            resultVerdictEl.textContent =
              "⚖️ 当前市价（" + fmt(currentMarketPrice) + " USDT）与回本价非常接近，卖出基本不赚不亏";
          } else {
            resultBox.className = "result-box red";
            resultVerdictEl.className = "result-verdict red";
            resultVerdictEl.textContent =
              "⚠️ 当前市价（" + fmt(currentMarketPrice) + " USDT）低于回本价，" +
              "现在卖会亏约 " + fmt(Math.abs(pnl)) + " USDT，" +
              "还需涨 " + fmt(Math.abs(gap)) + " USDT 才能回本";
          }
          resultVerdictEl.style.display = "block";
          resultDetailEl.textContent =
            "你花 " + fmt(amount) + " USDT 买到 " + fmt(btcBought, 6) + " BTC，" +
            "只要卖价超过 " + fmt(breakEven) + " USDT 就不亏。";
        } else {
          resultDetailEl.textContent =
            "你花 " + fmt(amount) + " USDT 可以买到约 " + fmt(btcBought, 6) + " BTC，" +
            "卖价只要高于 " + fmt(breakEven) + " USDT 就不亏。";
        }
      }

      function setWsState(state) {
        wsDotEl.className = "ws-dot " + state;
        wsLabelEl.textContent = state === "connected" ? "实时连接中" : state === "error" ? "连接断开" : "连接中...";
      }

      function connect() {
        if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        setWsState("");
        socket = new WebSocket(BINANCE_WS);
        socket.addEventListener("open",  () => setWsState("connected"));
        socket.addEventListener("error", () => setWsState("error"));
        socket.addEventListener("close", () => {
          setWsState("error");
          socket = null;
          reconnectTimer = setTimeout(connect, 2000);
        });
        socket.addEventListener("message", (ev) => {
          try {
            const price = Number(JSON.parse(ev.data).p);
            if (!Number.isFinite(price) || price <= 0) return;
            livePriceEl.classList.remove("flash");
            void livePriceEl.offsetWidth;
            livePriceEl.classList.add("flash");
            livePriceEl.textContent = fmt(price, 2);
            currentMarketPrice = price;
            calculate();
            updateAlertBadge();
          } catch (_) {}
        });
      }

      usePriceBtn.addEventListener("click", () => {
        if (!Number.isFinite(currentMarketPrice)) return;
        buyPriceInput.value = currentMarketPrice.toFixed(2);
        calculate();
        buyPriceInput.focus();
      });

      [buyPriceInput, amountInput, buyFeeRateInput, sellFeeRateInput].forEach(el =>
        el.addEventListener("input", calculate)
      );

      connect();
    </script>
  </body>
</html>
